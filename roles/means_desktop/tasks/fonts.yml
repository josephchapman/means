---

- name: 'Ensure ~/.fonts/ directory exists'
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.fonts/"
    state: directory
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775

- name: 'Ensure fonts directories exist'
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.fonts/{{ item.family }}/"
    state: directory
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775
  loop: "{{ query('items', google_fonts)}}"

- name: 'Fonts present (Regular)'
  ansible.builtin.get_url:
    url: "{{ item.regular.src }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.fonts/{{ item.family }}/{{ item.regular.dest }}"
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775
  loop: "{{ query('items', google_fonts)}}"
  register: font_get_regular

- name: 'Fonts present (Italic)'
  ansible.builtin.get_url:
    url: "{{ item.italic.src }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.fonts/{{ item.family }}/{{ item.italic.dest }}"
    owner: "{{ ansible_facts['env']['USER'] }}"
    group: "{{ ansible_facts['env']['USER'] }}"
    mode: 0775
  loop: "{{ query('items', google_fonts)}}"
  register: font_get_italic

- name: 'Rebuild font cache'
  when: font_get_regular.changed or font_get_italic.changed
  command: fc-cache -f -v {{ ansible_facts['env']['HOME'] }}/.fonts/