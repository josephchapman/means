---

- name: 'Ensure the trusted.gpg.d directory exists'
  become: true
  ansible.builtin.file:
    path: /etc/apt/trusted.gpg.d/
    state: directory
    mode: 0755

- name: 'Download Google''s Linux signing key'
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/linux_signing_key.pub
    mode: 0644
  changed_when: false

- name: 'Dearmor Google Linux signing key'
  become: true
  ansible.builtin.shell:
    cmd: gpg --dearmor -o /etc/apt/trusted.gpg.d/google-chrome.gpg /tmp/linux_signing_key.pub && chmod 644 /etc/apt/trusted.gpg.d/google-chrome.gpg
    creates: /etc/apt/trusted.gpg.d/google-chrome.gpg #chrome manages this key

- name: 'Check for existing Chrome repository file'
  stat:
    path: /etc/apt/sources.list.d/google-chrome.list
  register: chrome_file

- name: 'Backup existing any existing Chrome repository file'
  become: true
  copy:
    remote_src: yes
    src: /etc/apt/sources.list.d/google-chrome.list #chrome manages this list
    dest: "{{ backup_dir }}/google-chrome.list"
  when: chrome_file.stat.exists
  changed_when: false

- name: 'Google Chrome repository'
  become: true
  copy:
    src: google-chrome.list
    dest: /etc/apt/sources.list.d/google-chrome.list
    mode: 0644

# sudo apt-cache policy -> o:a pairs (e.g. Google LLC:stable)
- name: 'Allow Unattended-upgrade to use Google Repo'
  become: true
  lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\s*(//\s*)?"Google LLC:stable";\s*$'
    line: '        "Google LLC:stable";'
    insertafter: '^\s*(//\s*)?"\${distro_id}:\${distro_codename}-backports";$'

- name: '`google-chrome-stable` package'
  become: true
  apt:
    name: google-chrome-stable
    force_apt_get: yes
    update_cache: yes
    state: latest
