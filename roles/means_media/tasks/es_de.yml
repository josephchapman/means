- name: "Configure ES-DE settings"
  ansible.builtin.replace:
    path: "{{ ansible_facts['env']['HOME'] }}/ES-DE/settings/es_settings.xml"
    regexp: "(<{{ item.type }} name=\"{{ item.name }}\" value=\").*?(\" />)"
    replace: "\\1{{ item.value }}\\2"
  loop:
    - { type: "bool", name: "AlternativeEmulatorPerGame", value: "false" }
    - { type: "bool", name: "DisplayClock", value: "true" }
    - { type: "bool", name: "RunInBackground", value: "true" }
    - { type: "bool", name: "ShowQuitMenu", value: "true" }
    - { type: "string", name: "ThemeColorScheme", value: "oled" }
    - { type: "string", name: "ThemeFontSize", value: "medium" }
    - { type: "string", name: "ThemeVariant", value: "simpleTextlistWithVideos" }
    - {
        type: "string",
        name: "ROMDirectory",
        value: "{{ ansible_facts['env']['HOME'] }}/.local/share/media/",
      }
